<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Meu Portal de Entretenimento Digital</title>

    <!-- CSS Reset -->
    <link rel="stylesheet" href="reset.css">

    <!-- CSS Externo -->
    <link rel="stylesheet" href="estilo.css">

    <!-- CSS Interno -->
    <style>

        body{
            background-color: #f0f0f0;
        }

    </style>

</head>

<body>

    <h1 id="titulo-principal">
        Meu Portal de Entretenimento Digital
    </h1>

    <div class="container">

        <!-- SEÇÃO FILMES -->

        <div class="secao">

            <h2 style="color: darkblue;">
                Filmes e Séries
            </h2>

            <img class="imagem"
                src="https://via.placeholder.com/250"

            <img class="imagem"
                src="https://via.placeholder.com/250"
                alt="Séries">

            <p>
                Filmes e séries fazem parte do entretenimento moderno e digital.
            </p>

        </div>

        <!-- SEÇÃO MÚSICA -->

        <div class="secao">

            <h2>
                Música e Podcasts
            </h2>

            <img class="imagem"
                src="https://via.placeholder.com/250"

            <img class="imagem"
                src="https://via.placeholder.com/250"

            <p>
                Aplicativos de streaming transformaram a maneira de ouvir música.
            </p>

        </div>

        <!-- SEÇÃO GAMES -->

        <div class="secao">

            <h2>
                Games e Tecnologia
            </h2>

            <img class="imagem"
                src="https://via.placeholder.com/250"

                src="https://via.placeholder.com/250"

                Os games evoluem rapidamente junto com a tecnologia moderna.
